<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style id="brand-fonts">
@font-face { font-family:'Lora'; src:url('../../fonts/Lora-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
@font-face { font-family:'Lora'; src:url('../../fonts/Lora-Italic-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:italic; font-display:swap; }
@font-face { font-family:'Geist'; src:url('../../fonts/Geist-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
@font-face { font-family:'JetBrains Mono'; src:url('../../fonts/JetBrainsMono-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
@font-face { font-family:'JetBrains Mono'; src:url('../../fonts/JetBrainsMono-Italic-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:italic; font-display:swap; }
</style>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Geist', sans-serif; background: #EEE8DE; padding: 20px; }
  .swatches { display: flex; gap: 10px; }
  .swatch { flex: 1; border-radius: 4px; overflow: hidden; }
  .swatch-color { height: 80px; }
  .swatch-info { padding: 8px 10px; background: #F4F1EA; }
  .swatch-name { font-size: 11px; font-weight: 500; color: #0C0C0A; letter-spacing: 0.04em; text-transform: uppercase; }
  .swatch-hex  { font-size: 11px; color: rgba(12,12,10,0.5); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch">
    <div class="swatch-color" style="background:#0F1B2D;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Navy</div>
      <div class="swatch-hex">#0F1B2D</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#F4F1EA; border: 1px solid rgba(15,27,45,0.1);"></div>
    <div class="swatch-info">
      <div class="swatch-name">Off-White</div>
      <div class="swatch-hex">#F4F1EA</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#0C0C0A;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Grafite</div>
      <div class="swatch-hex">#0C0C0A</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#EB3F00;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Laranja</div>
      <div class="swatch-hex">#EB3F00</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#E8AD3B;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Mostarda</div>
      <div class="swatch-hex">#E8AD3B</div>
    </div>
  </div>
</div>
</body>
</html>
