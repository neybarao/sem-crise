<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style id="brand-fonts">
@font-face { font-family:'Lora'; src:url('../../fonts/Lora-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
@font-face { font-family:'Lora'; src:url('../../fonts/Lora-Italic-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:italic; font-display:swap; }
@font-face { font-family:'Geist'; src:url('../../fonts/Geist-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
@font-face { font-family:'JetBrains Mono'; src:url('../../fonts/JetBrainsMono-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
@font-face { font-family:'JetBrains Mono'; src:url('../../fonts/JetBrainsMono-Italic-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:italic; font-display:swap; }
</style>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Geist', sans-serif; background: #EEE8DE; padding: 24px 28px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid rgba(15,27,45,0.08); }
  .row:last-child { border-bottom: none; }
  .label { font-size: 10px; color: rgba(12,12,10,0.4); width: 72px; flex-shrink: 0; letter-spacing: 0.05em; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">20px 600</span>
    <span style="font-size:20px; font-weight:600; color:#0C0C0A;">Comunicação Estratégica</span>
  </div>
  <div class="row">
    <span class="label">18px 500</span>
    <span style="font-size:18px; font-weight:500; color:#0C0C0A;">Gestão de Crise e Reputação</span>
  </div>
  <div class="row">
    <span class="label">16px 400</span>
    <span style="font-size:16px; font-weight:400; color:#0C0C0A; line-height:1.6;">A crise chega sem avisar. A forma como você responde define tudo.</span>
  </div>
  <div class="row">
    <span class="label">14px 400</span>
    <span style="font-size:14px; font-weight:400; color:rgba(12,12,10,0.65); line-height:1.55;">Assessoria especializada em comunicação de crise para empresas e lideranças.</span>
  </div>
  <div class="row">
    <span class="label">12px 500 UC</span>
    <span style="font-size:12px; font-weight:500; color:rgba(12,12,10,0.45); letter-spacing:0.08em; text-transform:uppercase;">Serviços · Contato · Casos</span>
  </div>
</body>
</html>
