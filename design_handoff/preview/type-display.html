<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style id="brand-fonts">
@font-face { font-family:'Lora'; src:url('../../fonts/Lora-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
@font-face { font-family:'Lora'; src:url('../../fonts/Lora-Italic-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:italic; font-display:swap; }
@font-face { font-family:'Geist'; src:url('../../fonts/Geist-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
@font-face { font-family:'JetBrains Mono'; src:url('../../fonts/JetBrainsMono-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
@font-face { font-family:'JetBrains Mono'; src:url('../../fonts/JetBrainsMono-Italic-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:italic; font-display:swap; }
</style>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Lora', serif; background: #EEE8DE; padding: 24px 28px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid rgba(15,27,45,0.08); }
  .row:last-child { border-bottom: none; }
  .label { font-family: 'Geist', sans-serif; font-size: 10px; color: rgba(12,12,10,0.4); width: 64px; flex-shrink: 0; letter-spacing: 0.05em; }
  .sample { color: #0C0C0A; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">96px 600</span>
    <span class="sample" style="font-size:56px; font-weight:600; line-height:1; letter-spacing:-0.03em;">Sem Crise</span>
  </div>
  <div class="row">
    <span class="label">60px 600</span>
    <span class="sample" style="font-size:42px; font-weight:600; line-height:1.1; letter-spacing:-0.03em;">A crise é inevitável.</span>
  </div>
  <div class="row">
    <span class="label">36px 500</span>
    <span class="sample" style="font-size:30px; font-weight:500; line-height:1.2;">O estrago, não.</span>
  </div>
  <div class="row">
    <span class="label">24px 400</span>
    <span class="sample" style="font-size:22px; font-weight:400; line-height:1.3;">Assessoria de Comunicação</span>
  </div>
  <div class="row">
    <span class="label">24px italic</span>
    <span class="sample" style="font-size:22px; font-weight:400; font-style:italic; line-height:1.3;">"Quando a crise chega, a comunicação define o resultado."</span>
  </div>
</body>
</html>
